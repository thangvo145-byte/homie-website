<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Làm Nhà Lần Đầu – Thắng Nội Thất</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#f9c74f;--gold2:#f8961e;--dark:#0d1218;--navy:#0f1f3d;
  --cream:#faf6f0;--paper:#fff8f0;
}
body{
  background:radial-gradient(ellipse at 30% 40%,#1a2744 0%,#0d1218 60%,#050a10 100%);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;font-family:'Georgia','Times New Roman',serif;
  overflow:hidden;user-select:none;
}
/* ── BOOK ── */
.scene{position:relative;width:1000px;height:650px;perspective:2800px}
.book{width:1000px;height:650px;position:relative;transform-style:preserve-3d;
  filter:drop-shadow(0 50px 80px rgba(0,0,0,.8)) drop-shadow(0 0 40px rgba(249,199,79,.08))}
.page{position:absolute;top:0;width:500px;height:650px;overflow:hidden;background:var(--cream)}
.page.left{left:0;border-radius:6px 0 0 6px;
  box-shadow:inset -8px 0 20px rgba(0,0,0,.12),inset -1px 0 3px rgba(0,0,0,.08)}
.page.right{left:500px;border-radius:0 6px 6px 0;
  box-shadow:inset 8px 0 20px rgba(0,0,0,.12),inset 1px 0 3px rgba(0,0,0,.08)}
/* spine shadow layers */
.spine{position:absolute;left:493px;top:0;width:14px;height:650px;z-index:15;
  background:linear-gradient(to right,rgba(0,0,0,.35) 0%,rgba(30,40,80,.9) 30%,rgba(20,30,70,.95) 50%,rgba(30,40,80,.9) 70%,rgba(0,0,0,.35) 100%)}
/* ── FLIP ── */
.flip{position:absolute;top:0;width:500px;height:650px;transform-style:preserve-3d;z-index:20;pointer-events:none}
.flip.going-next{left:500px;transform-origin:left center}
.flip.going-prev{left:0;transform-origin:right center}
.flip-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;overflow:hidden;background:var(--cream)}
.flip-front{border-radius:0 6px 6px 0;box-shadow:inset 8px 0 20px rgba(0,0,0,.12)}
.flip-back{transform:rotateY(180deg);border-radius:6px 0 0 6px;box-shadow:inset -8px 0 20px rgba(0,0,0,.12)}
.flip.going-prev .flip-front{border-radius:6px 0 0 6px}
.flip.going-prev .flip-back{border-radius:0 6px 6px 0}
/* page curl shadow during flip */
.flip.animating{filter:drop-shadow(-12px 0 20px rgba(0,0,0,.4))}
/* ── CONTROLS ── */
.controls{display:flex;align-items:center;gap:24px;margin-top:20px}
.btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;
  width:52px;height:52px;border-radius:50%;font-size:20px;cursor:pointer;
  transition:all .25s;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(249,199,79,.3),transparent 70%);opacity:0;transition:opacity .2s}
.btn:hover::before{opacity:1}
.btn:hover{border-color:rgba(249,199,79,.5);transform:scale(1.1);color:var(--gold)}
.btn:disabled{opacity:.25;cursor:default;transform:none}
.btn:disabled::before{display:none}
.info-wrap{text-align:center}
.progress-bar{width:220px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.page-info{color:rgba(255,255,255,.55);font-size:12px;letter-spacing:2px}
/* ── SOUND BTN ── */
.sound-btn{position:fixed;top:20px;right:20px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.7);
  width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);
  transition:all .2s;z-index:100}
.sound-btn:hover{background:rgba(249,199,79,.2);color:var(--gold);border-color:rgba(249,199,79,.4)}
/* ── PAGE COMMON ── */
.p-cover{
  background:linear-gradient(155deg,#0a1628 0%,#162347 35%,#0f1c3a 60%,#070e1c 100%);
  color:#fff;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:36px 32px;text-align:center;position:relative;overflow:hidden}
.p-cover::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 30%,rgba(249,199,79,.12) 0%,transparent 65%)}
.p-cover .series{font-size:10px;letter-spacing:4px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:16px}
.p-cover .title{font-size:34px;font-weight:bold;line-height:1.15;color:var(--gold);
  margin-bottom:10px;text-shadow:0 0 40px rgba(249,199,79,.4)}
.p-cover .subtitle{font-size:14px;color:rgba(255,255,255,.75);margin-bottom:24px;font-style:italic;line-height:1.6}
.p-cover .divider{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 20px}
.p-cover .author-badge{
  background:rgba(249,199,79,.12);border:1px solid rgba(249,199,79,.3);
  border-radius:30px;padding:6px 18px;font-size:11px;color:var(--gold);
  letter-spacing:2px;text-transform:uppercase;margin-top:auto}
.p-cover .gift{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;
  text-transform:uppercase;margin-top:12px}
.p-plain{padding:40px 38px 34px;position:relative;background:var(--cream)}
.p-plain .page-num{position:absolute;bottom:16px;font-size:10px;color:#c5b89a;letter-spacing:2px}
.p-plain .page-num.left{left:34px}.p-plain .page-num.right{right:34px}
.p-plain h1{font-size:20px;color:#1a237e;margin-bottom:14px;line-height:1.3;
  border-bottom:2px solid rgba(249,199,79,.4);padding-bottom:10px}
.p-plain h2{font-size:14px;color:#1a237e;margin-bottom:8px;margin-top:16px;font-weight:bold}
.p-plain p{font-size:12.5px;line-height:1.9;color:#3a3028;margin-bottom:9px}
.p-plain .quote{
  border-left:3px solid var(--gold);padding:10px 14px;
  background:linear-gradient(135deg,rgba(249,199,79,.08),rgba(249,199,79,.02));
  margin:12px 0;border-radius:0 6px 6px 0;
  font-style:italic;font-size:12.5px;color:#4a3c28;line-height:1.75}
.p-plain ul{padding-left:16px;margin-bottom:8px}
.p-plain ul li{font-size:12px;line-height:1.85;color:#3a3028;margin-bottom:3px}
.p-plain ol{padding-left:18px;margin-bottom:8px}
.p-plain ol li{font-size:12px;line-height:1.85;color:#3a3028;margin-bottom:4px}
/* Chapter opener */
.p-chapter{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:38px 34px;text-align:center;position:relative;overflow:hidden}
.p-chapter .ch-bg{position:absolute;inset:0;opacity:.07}
.p-chapter .ch-num{font-size:120px;font-weight:bold;line-height:1;
  position:absolute;bottom:-20px;right:-10px;color:rgba(255,255,255,.06)}
.p-chapter .ch-label{font-size:10px;letter-spacing:4px;text-transform:uppercase;
  margin-bottom:10px;opacity:.6;color:#fff}
.p-chapter .ch-title{font-size:24px;font-weight:bold;color:#fff;line-height:1.3;margin-bottom:12px}
.p-chapter .ch-desc{font-size:12.5px;color:rgba(255,255,255,.78);line-height:1.75;max-width:340px}
.p-chapter svg{margin-bottom:18px}
/* Info boxes */
.hbox{background:linear-gradient(135deg,rgba(26,35,126,.07),rgba(26,35,126,.02));
  border:1px solid rgba(26,35,126,.18);border-radius:8px;padding:12px 14px;margin:10px 0}
.hbox .ht{font-size:11px;font-weight:bold;color:#1a237e;margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px}
.hbox p,.hbox li{font-size:12px;color:#3a3028;line-height:1.75}
.wbox{background:rgba(183,28,28,.04);border:1px solid rgba(183,28,28,.18);
  border-radius:8px;padding:11px 14px;margin:10px 0}
.wbox .wt{font-size:11px;font-weight:bold;color:#b71c1c;margin-bottom:5px}
.wbox p,.wbox li{font-size:12px;color:#3a3028;line-height:1.75}
.sbox{background:rgba(27,94,32,.04);border:1px solid rgba(27,94,32,.18);
  border-radius:8px;padding:11px 14px;margin:10px 0}
.sbox .st{font-size:11px;font-weight:bold;color:#1b5e20;margin-bottom:5px}
.sbox p,.sbox li{font-size:12px;color:#3a3028;line-height:1.75}
/* Tables */
.bt{width:100%;border-collapse:collapse;margin:8px 0;font-size:11.5px}
.bt th{background:#1a237e;color:#fff;padding:6px 9px;text-align:left;font-weight:600}
.bt td{padding:5px 9px;border-bottom:1px solid #e8dfd0;color:#3a3028}
.bt tr:nth-child(even) td{background:rgba(249,199,79,.06)}
/* Timeline */
.tl-item{display:flex;gap:10px;margin-bottom:9px;align-items:flex-start}
.tl-dot{width:26px;height:26px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:bold;color:#fff;margin-top:1px}
.tl-content h4{font-size:12.5px;color:#1a237e;margin-bottom:2px;font-weight:bold}
.tl-content p{font-size:11.5px;color:#555;line-height:1.65}
/* Checklist */
.cl-item{display:flex;gap:9px;margin-bottom:7px;align-items:flex-start}
.cl-box{width:15px;height:15px;border:2px solid #1a237e;border-radius:3px;flex-shrink:0;margin-top:2px}
.cl-text{font-size:11.5px;color:#3a3028;line-height:1.65}
/* Error list */
.err-item{margin-bottom:11px;padding-bottom:11px;border-bottom:1px solid rgba(183,28,28,.12)}
.err-item:last-child{border-bottom:none}
.err-num{display:inline-flex;align-items:center;justify-content:center;
  background:#b71c1c;color:#fff;width:20px;height:20px;border-radius:50%;
  font-size:10px;font-weight:bold;margin-right:6px;flex-shrink:0;vertical-align:middle}
.err-title{font-size:12.5px;font-weight:bold;color:#b71c1c}
.err-body{font-size:11.5px;color:#555;margin-top:2px;line-height:1.6}
.err-fix{font-size:11.5px;color:#2e7d32;margin-top:2px;line-height:1.6}
.err-fix::before{content:"✓ "}
/* TOC */
.toc-item{display:flex;gap:8px;margin-bottom:9px;align-items:flex-start}
.toc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.toc-num{font-size:9px;color:#aaa;font-weight:bold;letter-spacing:1px;margin-bottom:1px}
.toc-title{font-size:12.5px;color:#3a3028;font-weight:bold}
.toc-sub{font-size:11px;color:#888;line-height:1.5}
/* CTA Page */
.p-cta{
  background:linear-gradient(155deg,#0a1628 0%,#162347 40%,#0f1c3a 100%);
  color:#fff;display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:36px 32px;text-align:center;position:relative;overflow:hidden}
.p-cta::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 60%,rgba(249,199,79,.1) 0%,transparent 65%)}
.cta-logo{width:70px;height:70px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:bold;color:#0a1628;margin-bottom:16px;
  box-shadow:0 0 30px rgba(249,199,79,.4)}
.cta-name{font-size:22px;font-weight:bold;color:var(--gold);margin-bottom:6px}
.cta-tagline{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:20px;font-style:italic}
.cta-box{
  background:rgba(255,255,255,.07);border:1px solid rgba(249,199,79,.25);
  border-radius:12px;padding:16px 20px;margin-bottom:16px;width:100%;text-align:left}
.cta-box h4{font-size:12px;color:var(--gold);font-weight:bold;margin-bottom:8px;
  text-transform:uppercase;letter-spacing:1px}
.cta-box p{font-size:12px;color:rgba(255,255,255,.75);line-height:1.7}
.cta-contact{display:flex;flex-direction:column;gap:6px;width:100%}
.cta-item{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.8)}
.cta-item span:first-child{font-size:16px}
/* Responsive */
@media(max-width:1060px){
  .scene,.book{width:800px;height:520px}
  .page,.flip{width:400px;height:520px}
  .page.right,.flip.going-next{left:400px}
  .spine{left:393px}
}
@media(max-width:840px){
  .scene,.book{width:380px;height:580px}
  .page{width:380px;height:580px}
  .page.left{display:none}
  .page.right{left:0;border-radius:6px}
  .flip,.spine{display:none}
  .p-chapter .ch-num{font-size:80px}
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════
//  SOUND ENGINE  (Web Audio API — no files needed)
// ═══════════════════════════════════════════════
var audioCtx = null;
var soundOn  = true;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function toggleSound(){
  soundOn = !soundOn;
  document.getElementById('soundBtn').textContent = soundOn ? '🔊' : '🔇';
}

function playFlipSound(dir){
  if(!soundOn) return;
  try{
    var ctx = getAudioCtx();
    var t   = ctx.currentTime;
    var dur = 0.22;

    // ── White noise buffer ──
    var bufLen = ctx.sampleRate * dur;
    var buf    = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    var data   = buf.getChannelData(0);
    for(var i=0; i<bufLen; i++) data[i] = (Math.random()*2-1);

    var src  = ctx.createBufferSource();
    src.buffer = buf;

    // Bandpass filter – papery swish
    var bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = dir>0 ? 2800 : 2400;
    bp.Q.value = 0.6;

    // High-shelf boost for crisp edge
    var hs = ctx.createBiquadFilter();
    hs.type = 'highshelf';
    hs.frequency.value = 6000;
    hs.gain.value = 8;

    // Low cut
    var lc = ctx.createBiquadFilter();
    lc.type = 'highpass';
    lc.frequency.value = 400;

    // Gain envelope: quick attack, gentle tail
    var gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.38, t + 0.018);
    gain.gain.setValueAtTime(0.38, t + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);

    // Second mini-click at end (page landing)
    var click = ctx.createOscillator();
    click.type = 'sine';
    click.frequency.value = 180;
    var cGain = ctx.createGain();
    cGain.gain.setValueAtTime(0, t + dur * 0.75);
    cGain.gain.linearRampToValueAtTime(0.15, t + dur * 0.78);
    cGain.gain.exponentialRampToValueAtTime(0.001, t + dur + 0.04);
    click.connect(cGain);
    cGain.connect(ctx.destination);
    click.start(t + dur * 0.75);
    click.stop(t + dur + 0.05);

    src.connect(lc); lc.connect(bp); bp.connect(hs); hs.connect(gain);
    gain.connect(ctx.destination);
    src.start(t); src.stop(t + dur);
  } catch(e){}
}

`<div class="p-plain" style="background:linear-gradient(180deg,#fffef8,var(--cream))">

// ── 2 MỤC LỤC ──
`<div class="p-plain">
  <h1>Trong Cuốn Sách Này</h1>
  <div style="margin-top:12px">

var fl = document.getElementById('flipEl');
var ff = document.getElementById('flipFront');
var fb = document.getElementById('flipBack');
var pb = document.getElementById('prevBtn');
var nb = document.getElementById('nextBtn');
var pi = document.getElementById('pInfo');
var pf = document.getElementById('pFill');

function gp(i){ return pages[i] || '<div style="height:100%;background:var(--cream)"></div>'; }

function render(s){
  lp.innerHTML = gp(s*2);
  rp.innerHTML = gp(s*2+1);
  pi.textContent = 'Trang ' + (s*2+1) + ' / ' + pages.length;
  pf.style.width = ((s+1)/total*100) + '%';
  pb.disabled = s === 0;
  nb.disabled = s === total - 1;
}

function goPage(dir){
  if(animating) return;
  var n = cur + dir;
  if(n < 0 || n >= total) return;
  animating = true;
  playFlipSound(dir);

  if(dir === 1){
    fl.className = 'flip going-next animating';
    fl.style.display = 'block';
    fl.style.left = '500px';
    fl.style.transform = '';
    fl.style.transition = 'none';
    ff.innerHTML = gp(cur*2+1);
    fb.innerHTML = gp(n*2);
    rp.innerHTML = gp(n*2+1);
    requestAnimationFrame(function(){
      fl.style.transition = 'transform 0.6s cubic-bezier(0.645,0.045,0.355,1.000)';
      fl.style.transformOrigin = 'left center';
      fl.style.transform = 'rotateY(-180deg)';
    });
  } else {
    fl.className = 'flip going-prev animating';
    fl.style.display = 'block';
    fl.style.left = '0';
    fl.style.transform = 'rotateY(-180deg)';
    fl.style.transition = 'none';
    ff.innerHTML = gp(cur*2);
    fb.innerHTML = gp(n*2+1);
    lp.innerHTML = gp(n*2);
    requestAnimationFrame(function(){ requestAnimationFrame(function(){
      fl.style.transition = 'transform 0.6s cubic-bezier(0.645,0.045,0.355,1.000)';
      fl.style.transformOrigin = 'right center';
      fl.style.transform = 'rotateY(0deg)';
    }); });
  }

  setTimeout(function(){
    cur = n;
    fl.style.display = 'none';
    fl.className = 'flip';
    fl.style.transform = '';
    fl.style.transition = '';
    render(cur);
    animating = false;
  }, 630);
}

// Keyboard
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown') goPage(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') goPage(-1);
});

// Touch swipe
var tx = 0;
document.addEventListener('touchstart', function(e){ tx = e.touches[0].clientX; },{passive:true});
document.addEventListener('touchend', function(e){
  var d = e.changedTouches[0].clientX - tx;
  if(Math.abs(d) > 50) goPage(d < 0 ? 1 : -1);
});

// Init
render(0);
</script>
