{% extends "base.html" %}
{% block title %}Đăng nhập quản trị · {{ SITE.ten }}{% endblock %}
{% block leadform %}{% endblock %}
{% block content %}
<section class="py-5" style="min-height:55vh">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="lead-card p-4 p-md-5">
          <h1 class="h4 fw-bold mb-3">Quản trị Homie</h1>
          <p class="text-muted small">Khu vực dành cho chủ — xem khách để lại thông tin.</p>
          <form method="post">
            <input class="form-control form-control-lg mb-3" type="password" name="password" placeholder="Mật khẩu" required autofocus>
            <button class="btn btn-primary btn-lg w-100">Đăng nhập</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
